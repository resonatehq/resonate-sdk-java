name: ci

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - README.md
  pull_request:
    branches: [main]
    paths-ignore:
      - README.md

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    # Mirrors Python's python-version matrix. Note: the Gradle toolchain doubles
    # as the minimum runtime, so 21 is the floor (code compiled for 21 can't run
    # on older JDKs). -PjavaVersion is read by build.gradle.kts.
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java-version: ["21"]

    steps:
      - uses: actions/checkout@v4

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: check linting
        run: ./gradlew spotlessCheck -PjavaVersion=${{ matrix.java-version }}

      # TODO: missing type-check step. Python ran `ty check`; Java type-checks
      # during compilation (covered by the test task), so no separate step.
      - name: run tests
        run: ./gradlew test -PjavaVersion=${{ matrix.java-version }}

      # TODO: missing coverage + codecov upload. Add the `jacoco` plugin to
      # build.gradle, run `./gradlew test jacocoTestReport`, then upload with
      # codecov/codecov-action@v5 (needs secrets.CODECOV_TOKEN).

  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: install just
        uses: extractions/setup-just@v3

      - name: install resonate server
        run: |
          curl -sSL https://github.com/resonatehq/resonate/releases/latest/download/resonate_linux_x86_64.tar.gz | tar -xz
          sudo mv resonate /usr/local/bin/resonate

      - name: start resonate server
        run: |
          resonate serve --server-port 8080 &
          until curl -s -o /dev/null http://localhost:8080/api/v1/promises; do sleep 0.5; done

      - name: run examples
        run: just examples
        env:
          RESONATE_URL: http://localhost:8080
