name: cd

# TODO: missing publish step. Python pushed artifacts to PyPI via
# pypa/gh-action-pypi-publish. The Java equivalent (push to Maven Central) is
# not wired up: build.gradle has no `maven-publish`/`signing` plugins and no
# Sonatype credentials. Add those plus a `./gradlew publish` step, and restore
# `permissions: id-token: write` if using OIDC/trusted publishing.

on:
  release:
    types: [released]

jobs:
  run:
    name: release

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4

      # ponytail: build only for now. Replace/extend with `./gradlew publish`
      # once Maven Central publishing is configured.
      - name: build library
        run: ./gradlew build
